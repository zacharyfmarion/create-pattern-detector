name: box_pleat_v1
seed: 9170
imageSize: 512
padding: 32

splits:
  train: 0.85
  val: 0.10
  test: 0.05

families:
  box-pleat: 1.0

complexityBuckets:
  - name: small
    minCreases: 12
    maxCreases: 32
    weight: 0.35
  - name: medium
    minCreases: 33
    maxCreases: 90
    weight: 0.45
  - name: large
    minCreases: 91
    maxCreases: 180
    weight: 0.20

validation:
  strictGlobal: true
  globalBackend: rabbit-ear-solver
  minVertexDistance: 0.00001
  maxVertices: 900
  maxEdges: 1800
  requireBoxPleat: true

renderVariants:
  - name: bp_color_clean
    assignmentVisibility: visible
    count: 1
  - name: monochrome_ink
    assignmentVisibility: hidden
    count: 1
  - name: faint_blueprint
    assignmentVisibility: hidden
    count: 1
