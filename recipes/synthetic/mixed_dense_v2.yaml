name: mixed_dense_v2
seed: 9170
imageSize: 768
padding: 32

splits:
  train: 0.85
  val: 0.10
  test: 0.05

families:
  box-pleat: 0.50
  dense-non-bp: 0.50

complexityBuckets:
  - name: small
    minCreases: 80
    maxCreases: 180
    weight: 0.35
  - name: medium
    minCreases: 180
    maxCreases: 500
    weight: 0.40
  - name: dense
    minCreases: 500
    maxCreases: 1200
    weight: 0.25

validation:
  strictGlobal: true
  globalBackend: rabbit-ear-solver
  minVertexDistance: 0.000001
  maxVertices: 3000
  maxEdges: 4000
  requireBoxPleat: false
  boxPleatMode: dense
  requireDense: true

renderVariants:
  - name: mv_color_clean
    assignmentVisibility: visible
    count: 1
  - name: monochrome_ink
    assignmentVisibility: hidden
    count: 1
